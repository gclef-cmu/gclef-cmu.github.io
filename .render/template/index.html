<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="{{DESCRIPTION}}" />
        <title>{{TITLE}}</title>
        <link rel="icon" type="image/x-icon" href="/favicon.ico" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="stylesheet" href="{{STYLESHEET_HREF}}" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    </head>
    <body>
        {{NAV}}
        <main class="container">{{CONTENT}}</main>
        {{FOOTER}}
        
        <!-- Image Modal -->
        <div id="imageModal" class="image-modal">
            <span class="image-modal-close">&times;</span>
            <img class="image-modal-content" id="modalImage">
        </div>
        
        <script>
        function toggleBibtex(id) {
            const bibtexDiv = document.getElementById('bibtex-' + id);
            if (bibtexDiv.style.display === 'none' || bibtexDiv.style.display === '') {
                bibtexDiv.style.display = 'block';
            } else {
                bibtexDiv.style.display = 'none';
            }
        }
        
        // Image modal functionality
        document.addEventListener('DOMContentLoaded', function() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const closeBtn = document.querySelector('.image-modal-close');
            
            // Add click listeners only to project images (not preview images in highlights)
            const projectImages = document.querySelectorAll('.project-image');
            projectImages.forEach(function(img) {
                img.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // Show modal with display first, then trigger animation
                    modal.style.display = 'flex';
                    // Force reflow to ensure display is applied
                    modal.offsetHeight;
                    // Add active class for animation
                    modal.classList.add('active');
                    modalImg.src = this.src;
                    modalImg.alt = this.alt;
                });
            });
            
            // Close modal when clicking the X button
            closeBtn.addEventListener('click', function() {
                modal.classList.remove('active');
                // Hide modal after animation completes
                setTimeout(function() {
                    modal.style.display = 'none';
                }, 300);
            });
            
            // Close modal when clicking outside the image
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    // Hide modal after animation completes
                    setTimeout(function() {
                        modal.style.display = 'none';
                    }, 300);
                }
            });
            
            // Close modal with Escape key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modal.classList.contains('active')) {
                    modal.classList.remove('active');
                    // Hide modal after animation completes
                    setTimeout(function() {
                        modal.style.display = 'none';
                    }, 300);
                }
            });
        });
        </script>
    </body>
</html>
